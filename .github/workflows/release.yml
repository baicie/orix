name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: orix

jobs:
  # ── Build binaries for all targets ──────────────────────────────────────────
  build-linux:
    name: Build / Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --package orix-cli --target x86_64-unknown-linux-gnu

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: orix-linux-x86_64-bin
          path: target/x86_64-unknown-linux-gnu/release/orix

  build-windows:
    name: Build / Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        shell: pwsh
        run: cargo build --release --package orix-cli --target x86_64-pc-windows-msvc

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: orix-windows-x86_64-bin
          path: target/x86_64-pc-windows-msvc/release/orix.exe

  build-macos-x86_64:
    name: Build / macOS x86_64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --package orix-cli --target x86_64-apple-darwin

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: orix-macos-x86_64-bin
          path: target/x86_64-apple-darwin/release/orix

  build-macos-arm64:
    name: Build / macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --package orix-cli --target aarch64-apple-darwin

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: orix-macos-arm64-bin
          path: target/aarch64-apple-darwin/release/orix

  # ── Package: Windows MSI ────────────────────────────────────────────────────
  package-windows-msi:
    name: Package / Windows MSI
    needs: build-windows
    runs-on: windows-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: orix-windows-x86_64-bin
          path: bin

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          $wixVersion = "wix3141rtm"
          $wixPath = "$env:TEMP\wix-$wixVersion"

          if (-not (Test-Path $wixPath)) {
            New-Item -ItemType Directory -Force -Path $wixPath | Out-Null

            Invoke-WebRequest `
              -Uri "https://github.com/wixtoolset/wix3/releases/download/$wixVersion/wix314-binaries.zip" `
              -OutFile "$wixPath\wix.zip" `
              -UseBasicParsing

            Expand-Archive -Path "$wixPath\wix.zip" -DestinationPath $wixPath -Force
          }

          $env:PATH = "$wixPath;$env:PATH"
          Write-Host "WiX installed at: $wixPath"

      - name: Build MSI
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $v = $env:VERSION -replace '^v', ''
          $wixPath = "$env:TEMP\wix-wix3141rtm"
          $env:PATH = "$wixPath;$env:PATH"

          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\dist" | Out-Null

          $wxs = Get-Content "${{ github.workspace }}\packaging\wix\Product.wxs" -Raw
          $wxs = $wxs -replace '\$\(var\.Version\)', $v
          $wxs = $wxs -replace '\$\(var\.SourceDir\)', "${{ github.workspace }}\bin"
          $wxs | Set-Content -Path "${{ github.workspace }}\packaging\wix\Product_compiled.wxs" -NoNewline

          & "$wixPath\candle.exe" `
            -nologo `
            -out "${{ github.workspace }}\packaging\wix\Product_compiled.wixobj" `
            "${{ github.workspace }}\packaging\wix\Product_compiled.wxs"

          & "$wixPath\light.exe" `
            -nologo `
            -ext WixUIExtension `
            -ext WixUtilExtension `
            -out "${{ github.workspace }}\dist\orix-$v-x86_64-pc-windows-msvc.msi" `
            "${{ github.workspace }}\packaging\wix\Product_compiled.wixobj"

          Write-Host "MSI created:"
          Get-Item "${{ github.workspace }}\dist\orix-$v-x86_64-pc-windows-msvc.msi"

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-msi
          path: dist/*.msi

  # ── Package: macOS .pkg ─────────────────────────────────────────────────────
  package-macos-pkg:
    name: Package / macOS .pkg
    needs: [build-macos-x86_64, build-macos-arm64]
    runs-on: macos-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: orix-macos-x86_64-bin
          path: bin_x86_64

      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: orix-macos-arm64-bin
          path: bin_arm64

      - name: Make binaries executable
        run: chmod +x bin_x86_64/orix bin_arm64/orix

      - name: Build x86_64 .pkg
        run: |
          set -e

          v="${VERSION#v}"

          mkdir -p dist pkgroot_x86_64/usr/local/bin

          cp bin_x86_64/orix pkgroot_x86_64/usr/local/bin/orix
          chmod 755 pkgroot_x86_64/usr/local/bin/orix

          pkgbuild \
            --identifier com.baicie.orix.x86_64 \
            --version "$v" \
            --root pkgroot_x86_64 \
            --install-location / \
            dist/orix-${v}-x86_64.pkg

          rm -rf pkgroot_x86_64

      - name: Build ARM64 .pkg
        run: |
          set -e

          v="${VERSION#v}"

          mkdir -p dist pkgroot_arm64/usr/local/bin

          cp bin_arm64/orix pkgroot_arm64/usr/local/bin/orix
          chmod 755 pkgroot_arm64/usr/local/bin/orix

          pkgbuild \
            --identifier com.baicie.orix.arm64 \
            --version "$v" \
            --root pkgroot_arm64 \
            --install-location / \
            dist/orix-${v}-aarch64.pkg

          rm -rf pkgroot_arm64

      - name: Upload .pkg files
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-pkg
          path: dist/*.pkg

  # ── Package: Linux .deb ──────────────────────────────────────────────────────
  package-deb:
    name: Package / Linux .deb
    needs: build-linux
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: orix-linux-x86_64-bin
          path: bin

      - name: Build .deb
        run: |
          set -e

          v="${VERSION#v}"
          arch="amd64"
          deb_dir="${{ github.workspace }}/deb_root"

          rm -rf "$deb_dir"

          mkdir -p \
            "$deb_dir/DEBIAN" \
            "$deb_dir/usr/bin" \
            "${{ github.workspace }}/dist"

          cp bin/orix "$deb_dir/usr/bin/orix"
          chmod 755 "$deb_dir/usr/bin/orix"

          sed \
            -e "s/\$(VERSION)/$v/g" \
            -e "s/\$(ARCH)/$arch/g" \
            "${{ github.workspace }}/packaging/debian/control" \
            > "$deb_dir/DEBIAN/control"

          for script in postinst prerm postrm; do
            src="${{ github.workspace }}/packaging/debian/$script"

            if [ -f "$src" ]; then
              cp "$src" "$deb_dir/DEBIAN/$script"
              chmod 755 "$deb_dir/DEBIAN/$script"
            fi
          done

          dpkg-deb \
            --build \
            --root-owner-group \
            "$deb_dir" \
            "${{ github.workspace }}/dist/orix_${v}_${arch}.deb"

          rm -rf "$deb_dir"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-deb
          path: dist/*.deb

  # ── Package: Linux AppImage ─────────────────────────────────────────────────
  package-appimage:
    name: Package / Linux AppImage
    needs: build-linux
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: orix-linux-x86_64-bin
          path: bin

      - name: Install AppImage build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils

      - name: Extract appimagetool runtime
        run: |
          set -e

          mkdir -p "$HOME/.local/bin"

          curl -sSL \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o "$HOME/.local/bin/appimagetool"

          chmod +x "$HOME/.local/bin/appimagetool"

          cd "$HOME/.local/bin"
          ./appimagetool --appimage-extract > /dev/null 2>&1

      - name: Create AppDir
        run: |
          set -e

          mkdir -p dist AppDir/usr/bin

          cp bin/orix AppDir/usr/bin/orix
          chmod +x AppDir/usr/bin/orix

          cp "${{ github.workspace }}/packaging/appimage/AppRun" AppDir/AppRun
          chmod +x AppDir/AppRun

          cp "${{ github.workspace }}/packaging/appimage/orix.desktop" AppDir/orix.desktop

          if [ ! -f "${{ github.workspace }}/packaging/appimage/orix.png" ]; then
            echo "Error: missing packaging/appimage/orix.png"
            exit 1
          fi

          cp "${{ github.workspace }}/packaging/appimage/orix.png" AppDir/orix.png
          cp AppDir/orix.png AppDir/.DirIcon

          desktop-file-validate AppDir/orix.desktop

          echo "Binary info:"
          file AppDir/usr/bin/orix

          echo "AppDir structure:"
          find AppDir -maxdepth 4 -type f -print

      - name: Build AppImage
        env:
          ARCH: x86_64
        run: |
          set -e

          v="${VERSION#v}"

          "$HOME/.local/bin/squashfs-root/usr/bin/appimagetool" \
            AppDir \
            dist/orix-${v}-x86_64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-appimage
          path: dist/*.AppImage

  # ── Package: binary archives ─────────────────────────────────────────────────
  package-binaries:
    name: Package / Binary archives
    needs: [build-linux, build-windows, build-macos-x86_64, build-macos-arm64]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: orix-linux-x86_64-bin
          path: bin/linux

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: orix-windows-x86_64-bin
          path: bin/windows

      - name: Download macOS x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: orix-macos-x86_64-bin
          path: bin/macos-x86_64

      - name: Download macOS ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: orix-macos-arm64-bin
          path: bin/macos-arm64

      - name: Package Linux tar.gz
        run: |
          set -e

          v="${VERSION#v}"

          mkdir -p dist dist_linux

          cp bin/linux/orix dist_linux/orix
          chmod +x dist_linux/orix

          tar -czf dist/orix-${v}-x86_64-unknown-linux-gnu.tar.gz -C dist_linux orix

          rm -rf dist_linux

      - name: Package Windows zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $v = $env:VERSION -replace '^v', ''

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path dist_win | Out-Null

          Copy-Item bin/windows/orix.exe dist_win/orix.exe -Force

          Compress-Archive `
            -Path dist_win/orix.exe `
            -DestinationPath "dist/orix-$v-x86_64-pc-windows-msvc.zip" `
            -Force

          Remove-Item -Recurse -Force dist_win

      - name: Package macOS x86_64 tar.gz
        run: |
          set -e

          v="${VERSION#v}"

          mkdir -p dist dist_macos_x86_64

          cp bin/macos-x86_64/orix dist_macos_x86_64/orix
          chmod +x dist_macos_x86_64/orix

          tar -czf dist/orix-${v}-x86_64-apple-darwin.tar.gz -C dist_macos_x86_64 orix

          rm -rf dist_macos_x86_64

      - name: Package macOS ARM64 tar.gz
        run: |
          set -e

          v="${VERSION#v}"

          mkdir -p dist dist_macos_arm64

          cp bin/macos-arm64/orix dist_macos_arm64/orix
          chmod +x dist_macos_arm64/orix

          tar -czf dist/orix-${v}-aarch64-apple-darwin.tar.gz -C dist_macos_arm64 orix

          rm -rf dist_macos_arm64

      - name: Upload binary archives
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            dist/*.tar.gz
            dist/*.zip

  # ── GitHub Release ──────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs:
      [
        package-windows-msi,
        package-macos-pkg,
        package-deb,
        package-appimage,
        package-binaries,
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: List release files
        run: |
          echo "Release files:"
          find artifacts -maxdepth 2 -type f -print | sort

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
